services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      - redis
    environment:
      PUBLIC_BASE_URL: "http://47.121.190.61:4000"
      PORT: "4000"
      REDIS_ADDR: "redis:6379"
      REDIS_DB: "0"
      # TLS_CERT_FILE: /etc/ssl/cert.pem
      # TLS_KEY_FILE: /etc/ssl/key.pem
      ADMIN_PASSWORD: "141516"
      DEFAULT_PRICE: "10"
      APK_FILE: /app/downloads/app.apk
      ALIPAY_APP_ID: "2021006154646127"
      ALIPAY_PRIVATE_KEY: /app/alipay/private.key
      ALIPAY_PUBLIC_KEY: /app/alipay/public.key
      ALIPAY_GATEWAY: "https://openapi.alipay.com/gateway.do"
    volumes:
      - ./backend/ssl:/etc/ssl:ro
      - ./backend/downloads:/app/downloads:ro
      - ./backend/alipay:/app/alipay:ro
    ports:
      - "4000:4000"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: "http://47.121.190.61:4000"
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app-network

volumes:
  redis_data:

networks:
  app-network:
    driver: bridge
