services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      - redis
    environment:
      PUBLIC_BASE_URL: "https://test1.nyte.asia/message_read"
      PORT: "4000"
      REDIS_ADDR: "redis:6379"
      REDIS_DB: "0"
      TLS_CERT_FILE: /etc/ssl/cert.pem
      TLS_KEY_FILE: /etc/ssl/key.pem
    volumes:
      - ./backend/ssl:/etc/ssl:ro
    ports:
      - "4000:4000"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  redis_data:

networks:
  app-network:
    driver: bridge
